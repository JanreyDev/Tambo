stages:
  - lint
  - test
  - deploy_production

cache:
  key:
    files:
      - composer.lock
  paths:
    - vendor/

lint:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
  script:
    - ./vendor/bin/pint --test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

security:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer audit --locked --no-dev --format=plain
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
    - cp .env.example .env
    - php artisan key:generate
  script:
    - php artisan test --parallel
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  when: manual
  image: alpine:latest
  needs:
    - lint
    - security
    - test
  before_script:
    - apk add --no-cache openssh-client tar
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - tar -czf /tmp/deploy.tar.gz
        --exclude=".git"
        --exclude=".env"
        --exclude="vendor"
        --exclude="node_modules"
        --exclude="tests"
        --exclude="storage/logs/*"
        --exclude="storage/framework/cache/*"
        --exclude="storage/framework/sessions/*"
        --exclude="storage/framework/views/*"
        --exclude="docker-compose.yml"
        --exclude=".editorconfig"
        .
    - scp /tmp/deploy.tar.gz root@152.42.223.52:/tmp/bcmp-api-deploy.tar.gz
    - |
      ssh root@152.42.223.52 << 'DEPLOY'
        set -e
        LIVE="/var/www/bcmp/bcmp-api"
        NEW="/var/www/bcmp/bcmp-api-new"
        OLD="/var/www/bcmp/bcmp-api-old"
        DOMAIN="api.kapitan.ph"

        rm -rf "$NEW"
        mkdir -p "$NEW"
        cd "$NEW"
        tar -xzf /tmp/bcmp-api-deploy.tar.gz

        cp "$LIVE/.env" "$NEW/.env"
        cp -a "$LIVE/storage/logs" "$NEW/storage/logs" 2>/dev/null || true
        mkdir -p storage/logs storage/framework/{cache,sessions,views} bootstrap/cache

        composer install --no-dev --no-interaction --optimize-autoloader --no-progress 2>&1

        # Pre-deploy database backup
        DB_H=$(grep '^DB_HOST=' "$LIVE/.env" | sed 's/^DB_HOST=//')
        DB_P=$(grep '^DB_PORT=' "$LIVE/.env" | sed 's/^DB_PORT=//')
        DB_U=$(grep '^DB_USERNAME=' "$LIVE/.env" | sed 's/^DB_USERNAME=//')
        DB_W=$(grep '^DB_PASSWORD=' "$LIVE/.env" | sed 's/^DB_PASSWORD=//')
        DB_N=$(grep '^DB_DATABASE=' "$LIVE/.env" | sed 's/^DB_DATABASE=//')
        mkdir -p /opt/backups/db
        BACKUP="/opt/backups/db/${DB_N}-pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz"
        PGPASSWORD="$DB_W" pg_dump -h "$DB_H" -p "$DB_P" -U "$DB_U" --no-owner --no-privileges "$DB_N" 2>/dev/null | gzip > "$BACKUP" || echo "WARN: DB backup failed, continuing"
        [ -s "$BACKUP" ] && echo "Backup: $BACKUP ($(du -h "$BACKUP" | cut -f1))" || echo "WARN: Backup empty"
        unset DB_W

        php artisan migrate --force
        php artisan storage:link 2>/dev/null || true

        chown -R www-data:www-data "$NEW"
        chmod -R 775 "$NEW/storage" "$NEW/bootstrap/cache"

        # === PRE-SWAP VERIFICATION ===
        # Verify app boots: config compiles, routes compile, autoloader works
        cd "$NEW"
        php artisan config:cache 2>&1 || { echo "ABORT: config:cache failed in new build"; rm -rf "$NEW"; exit 1; }
        php artisan route:cache 2>&1 || { echo "ABORT: route:cache failed in new build"; rm -rf "$NEW"; exit 1; }
        # Clear caches — will re-cache after swap with correct paths
        php artisan config:clear
        php artisan route:clear
        echo "Pre-swap verification PASSED"

        # === SWAP ===
        rm -rf "$OLD"
        mv "$LIVE" "$OLD"
        mv "$NEW" "$LIVE"

        # Cache AFTER swap so paths resolve correctly
        cd "$LIVE"
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        systemctl reload php8.4-fpm

        echo "<?php opcache_reset(); echo 'ok';" > "$LIVE/public/opcache_reset.php"
        curl -sk "https://$DOMAIN/opcache_reset.php" --resolve "$DOMAIN:443:127.0.0.1" || true
        rm -f "$LIVE/public/opcache_reset.php"

        # === POST-SWAP SMOKE TEST ===
        HEALTH_OK=0
        for i in 1 2 3 4 5; do
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/up" --resolve "$DOMAIN:443:127.0.0.1")
          if [ "$STATUS" = "200" ]; then
            HEALTH_OK=1
            echo "Smoke test PASSED (attempt $i)"
            break
          fi
          echo "Smoke test attempt $i: HTTP $STATUS"
          sleep 2
        done

        if [ "$HEALTH_OK" != "1" ]; then
          echo "========================================="
          echo "SMOKE TEST FAILED — AUTO-ROLLBACK"
          echo "========================================="
          mv "$LIVE" "$LIVE-failed"
          mv "$OLD" "$LIVE"
          cd "$LIVE"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          systemctl reload php8.4-fpm
          echo "ROLLED BACK to previous version"
          rm -rf "$LIVE-failed"
          exit 1
        fi

        # === DEEP SMOKE TEST ===
        echo "Running deep smoke tests..."
        DEEP_FAIL=0

        # Test auth middleware — unauthenticated request must return 401
        STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/api/v1/auth/me" --resolve "$DOMAIN:443:127.0.0.1")
        if [ "$STATUS" != "401" ]; then
          echo "DEEP FAIL: /api/v1/auth/me returned $STATUS (expected 401)"
          DEEP_FAIL=1
        else
          echo "PASS: /api/v1/auth/me → 401 (auth protected)"
        fi

        # Test tenant-scoped route protection
        STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/api/v1/residents" --resolve "$DOMAIN:443:127.0.0.1")
        if [ "$STATUS" != "401" ]; then
          echo "DEEP FAIL: /api/v1/residents returned $STATUS (expected 401)"
          DEEP_FAIL=1
        else
          echo "PASS: /api/v1/residents → 401 (tenant-scoped, auth protected)"
        fi

        # Test public PSGC endpoint
        STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/api/v1/psgc/regions" --resolve "$DOMAIN:443:127.0.0.1")
        if [ "$STATUS" != "200" ]; then
          echo "DEEP FAIL: /api/v1/psgc/regions returned $STATUS (expected 200)"
          DEEP_FAIL=1
        else
          echo "PASS: /api/v1/psgc/regions → 200 (public PSGC endpoint)"
        fi

        if [ "$DEEP_FAIL" != "0" ]; then
          echo "========================================="
          echo "DEEP SMOKE TEST FAILED — AUTO-ROLLBACK"
          echo "========================================="
          mv "$LIVE" "$LIVE-failed"
          mv "$OLD" "$LIVE"
          cd "$LIVE"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          systemctl reload php8.4-fpm
          echo "ROLLED BACK to previous version"
          rm -rf "$LIVE-failed"
          exit 1
        fi

        echo "All deep smoke tests PASSED"

        rm /tmp/bcmp-api-deploy.tar.gz
        echo "Deployed bcmp-api at $(date) — verified healthy"
      DEPLOY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
