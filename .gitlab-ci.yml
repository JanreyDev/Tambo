stages:
  - lint
  - build
  - deploy_production

lint:
  stage: lint
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

security:
  stage: lint
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - |
      pnpm audit --json > /tmp/audit.json 2>&1 || true
      node -e "
        const fs = require('fs');
        try {
          const data = JSON.parse(fs.readFileSync('/tmp/audit.json', 'utf8'));
          const v = data.metadata?.vulnerabilities || {};
          console.log('Vulnerabilities: critical=' + (v.critical||0) + ' high=' + (v.high||0) + ' moderate=' + (v.moderate||0) + ' low=' + (v.low||0));
          if ((v.critical||0) > 0) { console.log('FAIL: Critical vulnerabilities found'); process.exit(1); }
        } catch(e) { console.log('Audit completed (no structured output)'); }
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

typecheck:
  stage: lint
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm exec tsc --noEmit
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL_PRODUCTION}"
    - export NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}"
    - echo "Building with API URL -> ${NEXT_PUBLIC_API_URL}"
    - echo "Sentry DSN -> ${NEXT_PUBLIC_SENTRY_DSN:+SET}"
    - pnpm build
    - |
      # Bundle size check (Principle 9: Fast on Slow Hardware)
      # Total JS across all routes (gzipped). Per-route first load is smaller due to code splitting.
      TOTAL_GZIP=$(find .next/static -name '*.js' -exec cat {} + 2>/dev/null | gzip -c | wc -c)
      KB=$((TOTAL_GZIP / 1024))
      echo "Total JS bundle (gzipped): ${KB}KB / 600KB limit"
      if [ "$KB" -gt 600 ]; then
        echo "FAIL: Total JS ${KB}KB exceeds 600KB limit (Principle 9)"
        exit 1
      fi
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  when: manual
  image: alpine:latest
  needs:
    - lint
    - typecheck
    - security
    - build
  before_script:
    - apk add --no-cache openssh-client tar gzip
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - tar -czf deploy.tar.gz .next/standalone .next/static public package.json .npmrc 2>/dev/null || tar -czf deploy.tar.gz .next/standalone .next/static package.json .npmrc
    - scp deploy.tar.gz root@152.42.223.52:/tmp/primex-founder-deploy.tar.gz
    - |
      ssh root@152.42.223.52 << 'DEPLOY'
        set -e
        LIVE="/var/www/primex-founder-web"
        NEW="/var/www/primex-founder-web-new"
        OLD="/var/www/primex-founder-web-old"
        APP_NAME="primex-founder-web"
        PORT=3002
        TEMP_PORT=4002

        rm -rf "$NEW"
        mkdir -p "$NEW"
        tar -xzf /tmp/primex-founder-deploy.tar.gz -C "$NEW"
        cp "$LIVE/.env" "$NEW/.env" 2>/dev/null || true

        # Prepare standalone
        cp -r "$NEW/.next/static" "$NEW/.next/standalone/.next/static"
        cp -r "$NEW/public" "$NEW/.next/standalone/public" 2>/dev/null || true

        # === PRE-SWAP VERIFICATION ===
        cd "$NEW/.next/standalone"
        PORT=$TEMP_PORT HOSTNAME=0.0.0.0 node server.js &
        TEMP_PID=$!
        sleep 3

        PRE_OK=0
        for i in 1 2 3; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$TEMP_PORT/" 2>/dev/null)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
            PRE_OK=1
            break
          fi
          sleep 2
        done

        kill $TEMP_PID 2>/dev/null || true
        wait $TEMP_PID 2>/dev/null || true

        if [ "$PRE_OK" != "1" ]; then
          echo "========================================="
          echo "PRE-SWAP VERIFICATION FAILED — new build does not start"
          echo "Production untouched. Aborting deploy."
          echo "========================================="
          rm -rf "$NEW"
          rm /tmp/primex-founder-deploy.tar.gz
          exit 1
        fi
        echo "Pre-swap verification PASSED"

        # === SWAP ===
        rm -rf "$OLD"
        mv "$LIVE" "$OLD" 2>/dev/null || true
        mv "$NEW" "$LIVE"

        cd "$LIVE/.next/standalone"
        pm2 delete $APP_NAME 2>/dev/null || true
        PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name $APP_NAME --cwd "$LIVE/.next/standalone"
        pm2 save

        # === POST-SWAP SMOKE TEST ===
        sleep 2
        HEALTH_OK=0
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT/" 2>/dev/null)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
            HEALTH_OK=1
            echo "Smoke test PASSED (attempt $i)"
            break
          fi
          echo "Smoke test attempt $i: HTTP $STATUS"
          sleep 2
        done

        if [ "$HEALTH_OK" != "1" ]; then
          echo "========================================="
          echo "SMOKE TEST FAILED — AUTO-ROLLBACK"
          echo "========================================="
          pm2 delete $APP_NAME 2>/dev/null || true
          mv "$LIVE" "$LIVE-failed"
          mv "$OLD" "$LIVE"
          cd "$LIVE/.next/standalone"
          PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name $APP_NAME --cwd "$LIVE/.next/standalone"
          pm2 save
          echo "ROLLED BACK to previous version"
          rm -rf "$LIVE-failed"
          exit 1
        fi

        # === COMPREHENSIVE SMOKE TEST (all 19 static routes) ===
        echo "Running comprehensive smoke tests..."
        DEEP_FAIL=0
        PASS_COUNT=0
        FAIL_COUNT=0

        for ROUTE in \
          / \
          /passcode \
          /vault \
          /vault/guide \
          /dashboard \
          /dashboard/bcmp \
          /dashboard/bcmp/tenants \
          /dashboard/bcmp/subscriptions \
          /dashboard/bcmp/analytics \
          /dashboard/bcmp/templates \
          /dashboard/bcmp/marketplace \
          /dashboard/lgmp \
          /dashboard/pdmp \
          /dashboard/infrastructure \
          /dashboard/users \
          /dashboard/support \
          /dashboard/settings \
          /dashboard/updates \
          /dashboard/help; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT$ROUTE" 2>/dev/null)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
            echo "PASS: $ROUTE → $STATUS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL: $ROUTE returned $STATUS (expected 200/302/307)"
            DEEP_FAIL=1
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi
        done

        echo "========================================="
        echo "Results: $PASS_COUNT passed, $FAIL_COUNT failed"
        echo "========================================="

        if [ "$DEEP_FAIL" != "0" ]; then
          echo "========================================="
          echo "COMPREHENSIVE SMOKE TEST FAILED — AUTO-ROLLBACK"
          echo "========================================="
          pm2 delete $APP_NAME 2>/dev/null || true
          mv "$LIVE" "$LIVE-failed"
          mv "$OLD" "$LIVE"
          cd "$LIVE/.next/standalone"
          PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name $APP_NAME --cwd "$LIVE/.next/standalone"
          pm2 save
          echo "ROLLED BACK to previous version"
          rm -rf "$LIVE-failed"
          exit 1
        fi
        echo "Comprehensive smoke tests PASSED"

        rm /tmp/primex-founder-deploy.tar.gz
        echo "Deployed $APP_NAME at $(date) — verified healthy"
      DEPLOY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
