stages:
  - lint
  - build
  - deploy

variables:
  NODE_VERSION: "24"
  STAGING_HOST: "159.89.207.105"
  STAGING_USER: "root"
  STAGING_PATH: "/var/www/bcmp-web"

# Cache node_modules between jobs
cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - node_modules/
    - .pnpm-store/

# ---------------------
# Lint Stage
# ---------------------
lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "production"

# ---------------------
# Build Stage — Staging
# ---------------------
build_staging:
  stage: build
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL_STAGING}"
    - echo "Building with API URL → ${NEXT_PUBLIC_API_URL}"
    - pnpm build
    - cp package.json .next/standalone/
    - cp -r public .next/standalone/public
    - cp -r .next/static .next/standalone/.next/static
    - cd .next/standalone && tar -czf ../../deploy.tar.gz --exclude="node_modules" .
  artifacts:
    paths:
      - deploy.tar.gz
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------
# Build Stage — Production
# ---------------------
build_production:
  stage: build
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL_PRODUCTION}"
    - echo "Building with API URL → ${NEXT_PUBLIC_API_URL}"
    - pnpm build
    - cp package.json .next/standalone/
    - cp -r public .next/standalone/public
    - cp -r .next/static .next/standalone/.next/static
    - cd .next/standalone && tar -czf ../../deploy.tar.gz --exclude="node_modules" .
  artifacts:
    paths:
      - deploy.tar.gz
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "production"

# ---------------------
# Deploy to Staging
# ---------------------
deploy_staging:
  stage: deploy
  image: alpine:latest
  needs:
    - build_staging
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 600 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp deploy.tar.gz ${STAGING_USER}@${STAGING_HOST}:/tmp/deploy.tar.gz
    - |
      ssh ${STAGING_USER}@${STAGING_HOST} << 'DEPLOY'
        set -e
        rm -rf /var/www/bcmp-web/*
        cd /var/www/bcmp-web
        tar -xzf /tmp/deploy.tar.gz
        cp /tmp/deploy.tar.gz /var/www/bcmp-web-backup.tar.gz
        npm install --omit=dev
        pm2 delete bcmp-web 2>/dev/null || true
        PORT=3000 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 start server.js --name bcmp-web
        pm2 save
        rm /tmp/deploy.tar.gz
        echo "Deployed at $(date)"
      DEPLOY
  environment:
    name: staging
    url: https://staging-bcmp.primex.ventures
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------
# Deploy to Production (when ready)
# ---------------------
deploy_production:
  stage: deploy
  image: alpine:latest
  needs:
    - build_production
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 600 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp deploy.tar.gz ${PRODUCTION_USER}@${PRODUCTION_HOST}:/tmp/deploy.tar.gz
    - |
      ssh ${PRODUCTION_USER}@${PRODUCTION_HOST} << 'DEPLOY'
        set -e
        rm -rf /var/www/bcmp-web/*
        cd /var/www/bcmp-web
        tar -xzf /tmp/deploy.tar.gz
        cp /tmp/deploy.tar.gz /var/www/bcmp-web-backup.tar.gz
        npm install --omit=dev
        pm2 delete bcmp-web 2>/dev/null || true
        PORT=3000 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 start server.js --name bcmp-web
        pm2 save
        rm /tmp/deploy.tar.gz
        echo "Deployed at $(date)"
      DEPLOY
  environment:
    name: production
    url: https://kapitan.ph
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: manual
