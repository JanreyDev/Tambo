stages:
  - lint
  - build
  - deploy_production

lint:
  stage: lint
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  image: node:24-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
  script:
    - export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL_PRODUCTION}"
    - echo "Building with API URL -> ${NEXT_PUBLIC_API_URL}"
    - pnpm build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client tar gzip
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - tar -czf deploy.tar.gz .next/standalone .next/static public package.json .npmrc 2>/dev/null || tar -czf deploy.tar.gz .next/standalone .next/static package.json .npmrc
    - scp deploy.tar.gz root@152.42.223.52:/tmp/bcmp-web-deploy.tar.gz
    - |
      ssh root@152.42.223.52 << 'DEPLOY'
        set -e
        LIVE="/var/www/bcmp-web"
        NEW="/var/www/bcmp-web-new"
        OLD="/var/www/bcmp-web-old"

        rm -rf "$NEW"
        mkdir -p "$NEW"
        tar -xzf /tmp/bcmp-web-deploy.tar.gz -C "$NEW"
        cp "$LIVE/.env" "$NEW/.env" 2>/dev/null || true
        cd "$NEW/.next/standalone"
        npm install --omit=dev 2>/dev/null || true

        rm -rf "$OLD"
        mv "$LIVE" "$OLD" 2>/dev/null || true
        mv "$NEW" "$LIVE"

        cp -r "$LIVE/.next/static" "$LIVE/.next/standalone/.next/static"

        cd "$LIVE/.next/standalone"
        pm2 describe bcmp-web > /dev/null 2>&1 && pm2 reload bcmp-web --update-env || PORT=3000 HOSTNAME=0.0.0.0 pm2 start server.js --name bcmp-web --update-env
        pm2 save

        rm /tmp/bcmp-web-deploy.tar.gz
        rm -rf "$OLD"
        echo "Deployed bcmp-web at $(date)"
      DEPLOY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
