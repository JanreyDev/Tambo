stages:
  - lint
  - test
  - deploy_production

cache:
  key:
    files:
      - composer.lock
  paths:
    - vendor/

lint:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
  script:
    - ./vendor/bin/pint --test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
    - cp .env.example .env
    - php artisan key:generate
  script:
    - php artisan test --parallel
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  image: alpine:latest
  needs:
    - lint
    - test
  before_script:
    - apk add --no-cache openssh-client tar
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - tar -czf /tmp/deploy.tar.gz
        --exclude=".git"
        --exclude=".env"
        --exclude="vendor"
        --exclude="node_modules"
        --exclude="tests"
        --exclude="storage/logs/*"
        --exclude="storage/framework/cache/*"
        --exclude="storage/framework/sessions/*"
        --exclude="storage/framework/views/*"
        --exclude="docker-compose.yml"
        --exclude=".editorconfig"
        .
    - scp /tmp/deploy.tar.gz root@152.42.223.52:/tmp/pulitika-api-deploy.tar.gz
    - |
      ssh root@152.42.223.52 << 'DEPLOY'
        set -e
        LIVE="/var/www/pulitika-api"
        NEW="/var/www/pulitika-api-new"
        OLD="/var/www/pulitika-api-old"

        rm -rf "$NEW"
        mkdir -p "$NEW"
        cd "$NEW"
        tar -xzf /tmp/pulitika-api-deploy.tar.gz

        cp "$LIVE/.env" "$NEW/.env"
        cp -a "$LIVE/storage/logs" "$NEW/storage/logs" 2>/dev/null || true
        mkdir -p storage/logs storage/framework/{cache,sessions,views} bootstrap/cache

        composer install --no-dev --no-interaction --optimize-autoloader --no-progress 2>&1

        php artisan migrate --force
        php artisan storage:link 2>/dev/null || true

        chown -R www-data:www-data "$NEW"
        chmod -R 775 "$NEW/storage" "$NEW/bootstrap/cache"

        rm -rf "$OLD"
        mv "$LIVE" "$OLD"
        mv "$NEW" "$LIVE"

        # Cache AFTER swap so paths resolve to final /var/www/pulitika-api
        cd "$LIVE"
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        systemctl reload php8.4-fpm

        echo "<?php opcache_reset(); echo 'ok';" > "$LIVE/public/opcache_reset.php"
        curl -sk https://api.pulitika.ph/opcache_reset.php --resolve api.pulitika.ph:443:127.0.0.1 || true
        rm -f "$LIVE/public/opcache_reset.php"

        rm -rf "$OLD" /tmp/pulitika-api-deploy.tar.gz
        echo "Deployed pulitika-api at $(date)"
      DEPLOY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
