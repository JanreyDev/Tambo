# =============================================================================
# PrimeX 3-Tier CI/CD Template — Next.js Web App (Shell Executor)
# =============================================================================
# Copy to .gitlab-ci.yml in any Next.js repo.
# Replace ALL {{PLACEHOLDER}} values before first push.
#
# Placeholders:
#   bcmp-web      — e.g., bcmp-web, data-web, media-web
#   /var/www/bcmp-web   — e.g., /var/www/bcmp-web, /var/www/lgmp/tarlac-province/data-web
#   kapitan.ph        — e.g., kapitan.ph, data.tarlac.ph
#   3000          — e.g., 3000, 3007 (PM2 production port)
#   bcmp    — e.g., bcmp, lgmp, primex-core (matches droplet runner tag)
#   main        — e.g., main
#   800  — e.g., 600 (KB gzip, Principle 9)
#   https://api.kapitan.ph/api/v1       — e.g., https://api.kapitan.ph/api/v1 (NEXT_PUBLIC_API_URL)
#
# 3-Tier System (set CI_TIER variable):
#   Tier 1 (Sprint):   lint → build → deploy → smoke
#   Tier 2 (Standard): lint → typecheck → security → build → deploy → verify
#   Tier 3 (Release):  Everything + bundle check + Playwright E2E
#
# Defaults: feature branches=Tier 1, main=Tier 2, tags=Tier 3
# =============================================================================

variables:
  CI_TIER:
    value: ""
    description: "Override tier: 1=Sprint, 2=Standard, 3=Release (empty=auto)"
  NEXT_PUBLIC_API_URL: "https://api.kapitan.ph/api/v1"

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      variables:
        CI_TIER_RESOLVED: "3"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_TIER != ""
      variables:
        CI_TIER_RESOLVED: $CI_TIER
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        CI_TIER_RESOLVED: "2"
    - if: $CI_COMMIT_BRANCH && $CI_TIER != ""
      variables:
        CI_TIER_RESOLVED: $CI_TIER
    - if: $CI_COMMIT_BRANCH
      variables:
        CI_TIER_RESOLVED: "1"

stages:
  - lint
  - build
  - deploy_production

# --- TIER 1+ (all tiers) ---

lint:
  stage: lint
  tags: [bcmp]
  script:
    - source /root/.nvm/nvm.sh
    - cd $CI_PROJECT_DIR
    - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
    - pnpm lint
  rules:
    - if: $CI_COMMIT_BRANCH

# --- TIER 2+ ---

typecheck:
  stage: lint
  tags: [bcmp]
  script:
    - source /root/.nvm/nvm.sh
    - cd $CI_PROJECT_DIR
    - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
    - pnpm exec tsc --noEmit
  rules:
    - if: $CI_TIER_RESOLVED >= "2"

security:
  stage: lint
  tags: [bcmp]
  script:
    - source /root/.nvm/nvm.sh
    - cd $CI_PROJECT_DIR
    - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
    - |
      pnpm audit --json > /tmp/audit.json 2>&1 || true
      node -e "
        const fs = require('fs');
        try {
          const d = JSON.parse(fs.readFileSync('/tmp/audit.json','utf8'));
          const v = d.metadata?.vulnerabilities || {};
          console.log('critical=' + (v.critical||0) + ' high=' + (v.high||0));
          if ((v.critical||0) > 0) { process.exit(1); }
        } catch(e) { console.log('Audit OK'); }
      "
  rules:
    - if: $CI_TIER_RESOLVED >= "2"

# --- BUILD (all tiers) ---

build:
  stage: build
  tags: [bcmp]
  script:
    - source /root/.nvm/nvm.sh
    - cd $CI_PROJECT_DIR
    - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
    - NODE_OPTIONS="--max-old-space-size=512" pnpm build
    - |
      # Bundle size check (Tier 3 only)
      if [ "${CI_TIER_RESOLVED}" -ge 3 ] 2>/dev/null; then
        TOTAL_GZIP=$(find .next/static -name '*.js' -exec cat {} + 2>/dev/null | gzip -c | wc -c)
        KB=$((TOTAL_GZIP / 1024))
        echo "JS bundle: ${KB}KB / 800KB limit"
        [ "$KB" -gt 800 ] && echo "FAIL: exceeds limit" && exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH

# --- DEPLOY ---

deploy_production:
  stage: deploy_production
  tags: [bcmp]
  when: manual
  needs:
    - lint
    - build
  script:
    - |
      source /root/.nvm/nvm.sh
      set -e
      LIVE="/var/www/bcmp-web"
      NEW="${LIVE}-new"
      OLD="${LIVE}-old"
      APP_NAME="bcmp-web"
      DOMAIN="kapitan.ph"
      PORT=3000
      TIER="${CI_TIER_RESOLVED}"

      echo "========================================="
      echo "DEPLOYING $APP_NAME (Tier $TIER)"
      echo "========================================="

      # --- PREPARE ---
      rm -rf "$NEW"
      mkdir -p "$NEW/.next"
      cp -a "$CI_PROJECT_DIR/.next/standalone" "$NEW/.next/standalone"
      cp -a "$CI_PROJECT_DIR/.next/static" "$NEW/.next/standalone/.next/static"
      cp -a "$CI_PROJECT_DIR/public" "$NEW/.next/standalone/public" 2>/dev/null || true
      [ -f "$LIVE/.env" ] && cp "$LIVE/.env" "$NEW/.env" && cp "$LIVE/.env" "$NEW/.next/standalone/.env" 2>/dev/null || true
      [ -d "$CI_PROJECT_DIR/e2e" ] && cp -a "$CI_PROJECT_DIR/e2e" "$NEW/e2e" 2>/dev/null || true
      [ -f "$CI_PROJECT_DIR/playwright.config.ts" ] && cp "$CI_PROJECT_DIR/playwright.config.ts" "$NEW/" 2>/dev/null || true

      # --- PRE-SWAP VERIFY ---
      cd "$NEW/.next/standalone"
      PORT=$((PORT + 1000)) HOSTNAME=0.0.0.0 node server.js &
      TEMP_PID=$!
      sleep 3
      PRE_OK=0
      for i in 1 2 3; do
        ST=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$((PORT + 1000))/" 2>/dev/null)
        if [ "$ST" = "200" ] || [ "$ST" = "302" ] || [ "$ST" = "307" ]; then PRE_OK=1; break; fi
        sleep 2
      done
      kill $TEMP_PID 2>/dev/null; wait $TEMP_PID 2>/dev/null || true
      [ "$PRE_OK" != "1" ] && echo "PRE-SWAP FAILED — aborting" && rm -rf "$NEW" && exit 1
      echo "Pre-swap verification PASSED"

      # --- ATOMIC SWAP ---
      rm -rf "$OLD"
      [ -d "$LIVE" ] && mv "$LIVE" "$OLD"
      mv "$NEW" "$LIVE"
      cd "$LIVE/.next/standalone"
      pm2 delete $APP_NAME 2>/dev/null || true
      PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name $APP_NAME
      pm2 save

      # --- ROLLBACK ---
      rollback() {
        echo "========== $1 — AUTO-ROLLBACK =========="
        pm2 delete $APP_NAME 2>/dev/null || true
        mv "$LIVE" "${LIVE}-failed"
        mv "$OLD" "$LIVE"
        cd "$LIVE/.next/standalone"
        PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name $APP_NAME
        pm2 save
        rm -rf "${LIVE}-failed"
        exit 1
      }

      # --- LAYER 1: SMOKE (all tiers) ---
      sleep 2
      HEALTH_OK=0
      for i in 1 2 3 4 5; do
        ST=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT/" 2>/dev/null)
        if [ "$ST" = "200" ] || [ "$ST" = "302" ] || [ "$ST" = "307" ]; then
          HEALTH_OK=1; echo "Layer 1 PASSED (attempt $i)"; break
        fi
        sleep 2
      done
      [ "$HEALTH_OK" != "1" ] && rollback "LAYER 1 SMOKE FAILED"

      # --- LAYER 2: COMPREHENSIVE (Tier 2+) ---
      if [ "$TIER" -ge 2 ] 2>/dev/null; then
        echo "Running Layer 2..."
        FAIL=0
        for ROUTE in / /dashboard; do
          ST=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT$ROUTE" 2>/dev/null)
          if [ "$ST" = "200" ] || [ "$ST" = "302" ] || [ "$ST" = "307" ]; then
            echo "PASS: $ROUTE → $ST"
          else
            echo "FAIL: $ROUTE → $ST"; FAIL=1
          fi
        done
        [ "$FAIL" != "0" ] && rollback "LAYER 2 COMPREHENSIVE FAILED"
      fi

      # --- LAYER 3: PLAYWRIGHT E2E (Tier 3 only) ---
      if [ "$TIER" -ge 3 ] 2>/dev/null && [ -d "$LIVE/e2e" ]; then
        echo "Running Layer 3: Playwright E2E..."
        cd /tmp && rm -rf e2e-runner && mkdir e2e-runner && cd e2e-runner
        cp "$LIVE/e2e/"*.spec.ts . 2>/dev/null || true
        cp "$LIVE/playwright.config.ts" . 2>/dev/null || true
        echo '{"devDependencies":{"@playwright/test":"^1.50.0"}}' > package.json
        npm install --no-audit --no-fund --quiet
        npx playwright install chromium --quiet 2>/dev/null || true
        CI=true BASE_URL="https://$DOMAIN" npx playwright test --reporter=list --timeout=15000 --retries=1 || rollback "LAYER 3 E2E FAILED"
        rm -rf /tmp/e2e-runner
        cd "$LIVE/.next/standalone"
      fi

      echo "========================================="
      echo "DEPLOY COMPLETE — $APP_NAME (Tier $TIER)"
      echo "========================================="
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
