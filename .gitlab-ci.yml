stages:
  - lint
  - test
  - deploy_production

cache:
  key:
    files:
      - composer.lock
  paths:
    - vendor/

lint:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
  script:
    - ./vendor/bin/pint --test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

analyse:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
  script:
    - ./vendor/bin/phpstan analyse --level=6 --no-progress --memory-limit=512M
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

security:
  stage: lint
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer audit --locked --no-dev --format=plain
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
    - cp .env.example .env
    - php artisan key:generate
  script:
    - php artisan test --parallel --min=60
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  when: manual
  image: alpine:latest
  needs:
    - lint
    - analyse
    - security
    - test
  before_script:
    - apk add --no-cache openssh-client tar
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - tar -czf /tmp/deploy.tar.gz
        --exclude=".git"
        --exclude=".env"
        --exclude="vendor"
        --exclude="node_modules"
        --exclude="tests"
        --exclude="storage/logs/*"
        --exclude="storage/framework/cache/*"
        --exclude="storage/framework/sessions/*"
        --exclude="storage/framework/views/*"
        --exclude="docker-compose.yml"
        --exclude=".editorconfig"
        .
    - scp /tmp/deploy.tar.gz root@152.42.223.52:/tmp/bcmp-api-deploy.tar.gz
    - |
      ssh root@152.42.223.52 << 'DEPLOY'
        set -e
        LIVE="/var/www/bcmp/bcmp-api"
        NEW="/var/www/bcmp/bcmp-api-new"
        OLD="/var/www/bcmp/bcmp-api-old"
        DOMAIN="api.kapitan.ph"

        rm -rf "$NEW"
        mkdir -p "$NEW"
        cd "$NEW"
        tar -xzf /tmp/bcmp-api-deploy.tar.gz

        cp "$LIVE/.env" "$NEW/.env"
        cp -a "$LIVE/storage/logs" "$NEW/storage/logs" 2>/dev/null || true
        mkdir -p storage/logs storage/framework/{cache,sessions,views} bootstrap/cache

        composer install --no-dev --no-interaction --optimize-autoloader --no-progress 2>&1

        # Pre-deploy database backup
        DB_H=$(grep '^DB_HOST=' "$LIVE/.env" | sed 's/^DB_HOST=//')
        DB_P=$(grep '^DB_PORT=' "$LIVE/.env" | sed 's/^DB_PORT=//')
        DB_U=$(grep '^DB_USERNAME=' "$LIVE/.env" | sed 's/^DB_USERNAME=//')
        DB_W=$(grep '^DB_PASSWORD=' "$LIVE/.env" | sed 's/^DB_PASSWORD=//')
        DB_N=$(grep '^DB_DATABASE=' "$LIVE/.env" | sed 's/^DB_DATABASE=//')
        mkdir -p /opt/backups/db
        BACKUP="/opt/backups/db/${DB_N}-pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz"
        PGPASSWORD="$DB_W" pg_dump -h "$DB_H" -p "$DB_P" -U "$DB_U" --no-owner --no-privileges "$DB_N" 2>/dev/null | gzip > "$BACKUP" || echo "WARN: DB backup failed, continuing"
        [ -s "$BACKUP" ] && echo "Backup: $BACKUP ($(du -h "$BACKUP" | cut -f1))" || echo "WARN: Backup empty"
        unset DB_W

        php artisan migrate --force
        php artisan storage:link 2>/dev/null || true

        chown -R www-data:www-data "$NEW"
        chmod -R 775 "$NEW/storage" "$NEW/bootstrap/cache"

        # === PRE-SWAP VERIFICATION ===
        # Verify app boots: config compiles, routes compile, autoloader works
        cd "$NEW"
        php artisan config:cache 2>&1 || { echo "ABORT: config:cache failed in new build"; rm -rf "$NEW"; exit 1; }
        php artisan route:cache 2>&1 || { echo "ABORT: route:cache failed in new build"; rm -rf "$NEW"; exit 1; }
        # Clear caches — will re-cache after swap with correct paths
        php artisan config:clear
        php artisan route:clear
        echo "Pre-swap verification PASSED"

        # === SWAP ===
        rm -rf "$OLD"
        mv "$LIVE" "$OLD"
        mv "$NEW" "$LIVE"

        # Cache AFTER swap so paths resolve correctly
        cd "$LIVE"
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        systemctl reload php8.4-fpm

        echo "<?php opcache_reset(); echo 'ok';" > "$LIVE/public/opcache_reset.php"
        curl -sk "https://$DOMAIN/opcache_reset.php" --resolve "$DOMAIN:443:127.0.0.1" || true
        rm -f "$LIVE/public/opcache_reset.php"

        # === ROLLBACK FUNCTION ===
        rollback() {
          local REASON="$1"
          echo "========================================="
          echo "$REASON — AUTO-ROLLBACK"
          echo "========================================="
          mv "$LIVE" "$LIVE-failed"
          mv "$OLD" "$LIVE"
          cd "$LIVE"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          systemctl reload php8.4-fpm
          echo "ROLLED BACK to previous version"
          rm -rf "$LIVE-failed"
          exit 1
        }

        # === LAYER 1: POST-SWAP SMOKE TEST ===
        HEALTH_OK=0
        for i in 1 2 3 4 5; do
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/up" --resolve "$DOMAIN:443:127.0.0.1")
          if [ "$STATUS" = "200" ]; then
            HEALTH_OK=1
            echo "Layer 1 smoke test PASSED (attempt $i)"
            break
          fi
          echo "Layer 1 smoke test attempt $i: HTTP $STATUS"
          sleep 2
        done

        if [ "$HEALTH_OK" != "1" ]; then
          rollback "LAYER 1 SMOKE TEST FAILED"
        fi

        # === LAYER 2: COMPREHENSIVE SMOKE TEST (all route groups) ===
        echo ""
        echo "Running Layer 2: comprehensive smoke tests..."
        echo ""
        DEEP_FAIL=0
        PASS_COUNT=0
        FAIL_COUNT=0

        # Helper: test expected status code
        check_status() {
          local ENDPOINT="$1" EXPECTED="$2" LABEL="$3"
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN$ENDPOINT" --resolve "$DOMAIN:443:127.0.0.1")
          if [ "$STATUS" = "$EXPECTED" ]; then
            echo "PASS: $ENDPOINT → $STATUS ($LABEL)"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL: $ENDPOINT returned $STATUS (expected $EXPECTED) ($LABEL)"
            DEEP_FAIL=1
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi
        }

        # --- Public endpoints (must return 200) ---
        check_status "/up" "200" "health check"
        check_status "/api/v1/psgc/provinces" "200" "public PSGC"

        # --- Auth-protected endpoints (must return 401 without token) ---
        check_status "/api/v1/auth/me" "401" "auth protection"
        check_status "/api/v1/residents" "401" "residents - tenant scoped"
        check_status "/api/v1/dashboard/stats" "401" "dashboard stats"
        check_status "/api/v1/settings" "401" "settings"
        check_status "/api/v1/ai/credits" "401" "AI credits"
        check_status "/api/v1/voters" "401" "voters"
        check_status "/api/v1/issued-documents" "401" "issued documents"
        check_status "/api/v1/kp-cases" "401" "KP cases"
        check_status "/api/v1/blotters" "401" "blotters"
        check_status "/api/v1/vawc-cases" "401" "VAWC cases"
        check_status "/api/v1/tanods" "401" "tanods"
        check_status "/api/v1/budgets" "401" "finance - budgets"
        check_status "/api/v1/inventory-items" "401" "inventory items"
        check_status "/api/v1/drive/files" "401" "drive files"
        check_status "/api/v1/marketplace/products" "401" "marketplace"
        check_status "/api/v1/messages" "401" "messages"
        check_status "/api/v1/establishments" "401" "establishments"
        check_status "/api/v1/lots-buildings" "401" "lots & buildings"
        check_status "/api/v1/map/residents" "401" "map residents"
        check_status "/api/v1/households" "401" "households"
        check_status "/api/v1/officials" "401" "officials"
        check_status "/api/v1/puroks" "401" "puroks"
        check_status "/api/v1/document-templates" "401" "document templates"
        check_status "/api/v1/posts" "401" "public portal posts"
        check_status "/api/v1/employees" "401" "HRIS employees"
        check_status "/api/v1/evacuations" "401" "DRRM evacuations"
        check_status "/api/v1/gad-plans" "401" "GAD plans"
        check_status "/api/v1/assets" "401" "assets"

        # --- Admin-protected endpoints (must return 401) ---
        check_status "/api/v1/admin/barangays" "401" "admin barangays"

        echo "========================================="
        echo "Results: $PASS_COUNT passed, $FAIL_COUNT failed"
        echo "========================================="

        if [ "$DEEP_FAIL" != "0" ]; then
          rollback "LAYER 2 COMPREHENSIVE SMOKE TEST FAILED"
        fi

        echo "Layer 2 comprehensive smoke tests PASSED"

        # === LAYER 3: E2E API VERIFICATION (Playwright) ===
        echo ""
        echo "Running Layer 3: E2E API verification..."
        echo ""

        E2E_FAIL=0

        if [ -d "$LIVE/e2e" ] && [ -f "$LIVE/playwright.config.ts" ]; then
          E2E_RUNNER="/tmp/$(basename $LIVE)-e2e-runner"
          rm -rf "$E2E_RUNNER"
          mkdir -p "$E2E_RUNNER/e2e"

          cp "$LIVE/e2e/"*.spec.ts "$E2E_RUNNER/e2e/" 2>/dev/null || true
          cp "$LIVE/playwright.config.ts" "$E2E_RUNNER/" 2>/dev/null || true

          printf '{"name":"e2e-runner","private":true,"devDependencies":{"@playwright/test":"^1.50.0"}}' > "$E2E_RUNNER/package.json"

          cd "$E2E_RUNNER"
          npm install --no-audit --no-fund 2>&1 | tail -1

          CI=true API_URL="https://$DOMAIN" npx playwright test \
            --reporter=list \
            --timeout=15000 \
            --retries=1 2>&1 || E2E_FAIL=1

          rm -rf "$E2E_RUNNER"
          cd "$LIVE"

          if [ "$E2E_FAIL" != "0" ]; then
            rollback "LAYER 3 E2E API VERIFICATION FAILED"
          fi

          echo "Layer 3 E2E API verification PASSED"
        else
          echo "Layer 3 SKIPPED — no e2e/ directory or playwright.config.ts found"
        fi

        echo ""
        echo "========================================="
        echo "DEPLOY COMPLETE — ALL 3 LAYERS PASSED"
        echo "  Layer 1: Process alive (curl /up)"
        echo "  Layer 2: All routes respond (curl)"
        echo "  Layer 3: Response bodies valid (Playwright)"
        echo "========================================="
        echo "Deployed $(basename $LIVE) at $(date)"

        rm /tmp/bcmp-api-deploy.tar.gz
      DEPLOY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
