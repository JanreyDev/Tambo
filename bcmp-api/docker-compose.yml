services:
  postgres:
    image: postgres:17-alpine
    container_name: bcmp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bcmp_v5
      POSTGRES_USER: bcmp
      POSTGRES_PASSWORD: bcmp_dev_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcmp -d bcmp_v5"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bcmp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
