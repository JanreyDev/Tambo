services:
  postgres:
    image: postgres:17-alpine
    container_name: pulitika-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: pulitika
      POSTGRES_USER: pulitika
      POSTGRES_PASSWORD: pulitika_dev_2026
    volumes:
      - pulitika_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulitika -d pulitika"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pulitika-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - pulitika_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pulitika_postgres_data:
    driver: local
  pulitika_redis_data:
    driver: local
