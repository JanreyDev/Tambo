# =============================================================================
# PrimeX 3-Tier CI/CD Template — Laravel API (Shell Executor)
# =============================================================================
# Copy to .gitlab-ci.yml in any Laravel API repo.
# Replace ALL {{PLACEHOLDER}} values before first push.
#
# Placeholders:
#   primex-api      — e.g., bcmp-api, primex-api, tarlac-province-api
#   /var/www/primex-api   — e.g., /var/www/bcmp-api, /var/www/primex-api
#   api.primex.ventures        — e.g., api.kapitan.ph, api.primex.ventures
#   primex-core    — e.g., bcmp, primex-core, lgmp (matches droplet runner tag)
#   main        — e.g., main
#
# 3-Tier System (set CI_TIER variable):
#   Tier 1 (Sprint):   lint → build → deploy → smoke
#   Tier 2 (Standard): lint → analyze → test → security → build → deploy → verify
#   Tier 3 (Release):  Everything + coverage + SBOM + Playwright E2E
#
# Defaults: feature branches=Tier 1, main=Tier 2, tags=Tier 3
# Override: set CI_TIER=1|2|3 in pipeline variables
# =============================================================================

variables:
  CI_TIER:
    value: ""
    description: "Override tier: 1=Sprint, 2=Standard, 3=Release (empty=auto)"

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      variables:
        CI_TIER_RESOLVED: "3"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_TIER != ""
      variables:
        CI_TIER_RESOLVED: $CI_TIER
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        CI_TIER_RESOLVED: "2"
    - if: $CI_COMMIT_BRANCH && $CI_TIER != ""
      variables:
        CI_TIER_RESOLVED: $CI_TIER
    - if: $CI_COMMIT_BRANCH
      variables:
        CI_TIER_RESOLVED: "1"

stages:
  - lint
  - test
  - security
  - deploy_production

# --- TIER 1+ (all tiers) ---

lint:
  stage: lint
  tags: [primex-core]
  script:
    - cd $CI_PROJECT_DIR
    - composer install --no-interaction --prefer-dist --no-progress --quiet
    - ./vendor/bin/pint --test
  rules:
    - if: $CI_COMMIT_BRANCH

# --- TIER 2+ ---

analyse:
  stage: lint
  tags: [primex-core]
  script:
    - cd $CI_PROJECT_DIR
    - composer install --no-interaction --prefer-dist --no-progress --quiet
    - ./vendor/bin/phpstan analyse --level=6 --no-progress --memory-limit=512M
  rules:
    - if: $CI_TIER_RESOLVED >= "2"

test:
  stage: test
  tags: [primex-core]
  script:
    - cd $CI_PROJECT_DIR
    - composer install --no-interaction --prefer-dist --no-progress --quiet
    - cp .env.testing .env 2>/dev/null || cp .env.example .env
    - php artisan key:generate --quiet
    - php artisan test --parallel
  rules:
    - if: $CI_TIER_RESOLVED >= "2"

test_coverage:
  stage: test
  tags: [primex-core]
  script:
    - cd $CI_PROJECT_DIR
    - composer install --no-interaction --prefer-dist --no-progress --quiet
    - cp .env.testing .env 2>/dev/null || cp .env.example .env
    - php artisan key:generate --quiet
    - php artisan test --parallel --coverage --min=60
  rules:
    - if: $CI_TIER_RESOLVED >= "3"

security:
  stage: security
  tags: [primex-core]
  script:
    - composer audit --locked --no-dev --format=plain
  rules:
    - if: $CI_TIER_RESOLVED >= "2"

# --- DEPLOY (all tiers, manual on Tier 2+) ---

deploy_production:
  stage: deploy_production
  tags: [primex-core]
  when: manual
  script:
    - |
      set -e
      LIVE="/var/www/primex-api"
      NEW="${LIVE}-new"
      OLD="${LIVE}-old"
      DOMAIN="api.primex.ventures"
      APP_NAME="primex-api"
      TIER="${CI_TIER_RESOLVED}"

      echo "========================================="
      echo "DEPLOYING $APP_NAME (Tier $TIER)"
      echo "========================================="

      # --- BUILD ---
      rm -rf "$NEW"
      cp -a "$CI_PROJECT_DIR" "$NEW"
      cp "$LIVE/.env" "$NEW/.env"
      cd "$NEW"
      composer install --no-dev --no-interaction --optimize-autoloader --no-progress

      # --- DB BACKUP (all tiers) ---
      DB_H=$(grep '^DB_HOST=' "$NEW/.env" | sed 's/^DB_HOST=//')
      DB_P=$(grep '^DB_PORT=' "$NEW/.env" | sed 's/^DB_PORT=//')
      DB_U=$(grep '^DB_USERNAME=' "$NEW/.env" | sed 's/^DB_USERNAME=//')
      DB_W=$(grep '^DB_PASSWORD=' "$NEW/.env" | sed 's/^DB_PASSWORD=//')
      DB_N=$(grep '^DB_DATABASE=' "$NEW/.env" | sed 's/^DB_DATABASE=//')
      mkdir -p /opt/backups/db
      BACKUP="/opt/backups/db/${DB_N}-$(date +%Y%m%d%H%M%S).sql.gz"
      PGPASSWORD="$DB_W" pg_dump -h "$DB_H" -p "$DB_P" -U "$DB_U" --no-owner "$DB_N" 2>/dev/null | gzip > "$BACKUP" || echo "WARN: backup failed"
      unset DB_W

      # --- MIGRATE ---
      php artisan migrate --force

      # --- PRE-SWAP VERIFY ---
      php artisan config:cache || { echo "ABORT: config:cache failed"; rm -rf "$NEW"; exit 1; }
      php artisan route:cache || { echo "ABORT: route:cache failed"; rm -rf "$NEW"; exit 1; }
      php artisan config:clear && php artisan route:clear
      echo "Pre-swap verification PASSED"

      # --- SETUP ---
      php artisan storage:link 2>/dev/null || true
      chown -R www-data:www-data "$NEW"
      chmod -R 775 "$NEW/storage" "$NEW/bootstrap/cache"

      # --- ATOMIC SWAP ---
      rm -rf "$OLD"
      [ -d "$LIVE" ] && mv "$LIVE" "$OLD"
      mv "$NEW" "$LIVE"

      cd "$LIVE"
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      systemctl reload php8.4-fpm

      # --- ROLLBACK FUNCTION ---
      rollback() {
        echo "========== $1 — AUTO-ROLLBACK =========="
        mv "$LIVE" "${LIVE}-failed"
        mv "$OLD" "$LIVE"
        cd "$LIVE"
        php artisan config:cache && php artisan route:cache && php artisan view:cache
        systemctl reload php8.4-fpm
        rm -rf "${LIVE}-failed"
        exit 1
      }

      # --- LAYER 1: SMOKE (all tiers) ---
      HEALTH_OK=0
      for i in 1 2 3 4 5; do
        STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN/up" --resolve "$DOMAIN:443:127.0.0.1")
        [ "$STATUS" = "200" ] && HEALTH_OK=1 && echo "Layer 1 PASSED (attempt $i)" && break
        sleep 2
      done
      [ "$HEALTH_OK" != "1" ] && rollback "LAYER 1 SMOKE FAILED"

      # --- LAYER 2: COMPREHENSIVE (Tier 2+) ---
      if [ "$TIER" -ge 2 ]; then
        echo "Running Layer 2: comprehensive checks..."
        FAIL=0
        check_status() {
          local EP="$1" EXP="$2"
          ST=$(curl -sk -o /dev/null -w "%{http_code}" "https://$DOMAIN$EP" --resolve "$DOMAIN:443:127.0.0.1")
          [ "$ST" = "$EXP" ] && echo "PASS: $EP → $ST" || { echo "FAIL: $EP → $ST (expected $EXP)"; FAIL=1; }
        }
        check_status "/up" "200"
        # Add project-specific routes here
        [ "$FAIL" != "0" ] && rollback "LAYER 2 COMPREHENSIVE FAILED"
      fi

      # --- LAYER 3: PLAYWRIGHT E2E (Tier 3 only) ---
      if [ "$TIER" -ge 3 ] && [ -d "$LIVE/e2e" ]; then
        echo "Running Layer 3: Playwright E2E..."
        cd /tmp && rm -rf e2e-runner && mkdir e2e-runner && cd e2e-runner
        cp "$LIVE/e2e/"*.spec.ts . 2>/dev/null
        cp "$LIVE/playwright.config.ts" . 2>/dev/null
        echo '{"devDependencies":{"@playwright/test":"^1.50.0"}}' > package.json
        npm install --no-audit --no-fund --quiet
        CI=true API_URL="https://$DOMAIN" npx playwright test --reporter=list --timeout=15000 --retries=1 || rollback "LAYER 3 E2E FAILED"
        rm -rf /tmp/e2e-runner
        cd "$LIVE"
      fi

      echo "========================================="
      echo "DEPLOY COMPLETE — $APP_NAME (Tier $TIER)"
      echo "========================================="
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
